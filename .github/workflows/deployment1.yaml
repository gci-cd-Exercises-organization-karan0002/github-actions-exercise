name: Deployment Exercise 1
# on: [push, workflow_dispatch]
on:
  pull_request: #trigger 1, event
    types: [opened, edited] # "event activity types" of pull request "event"
    branches:
      - master # main
      - "dev-*" # dev-new dev-this-is-new
      - "feat/**" # feat/new feat/new/button
  workflow_dispatch: #trigger 2, event
  push:
    branches:
      - master # main
      - "dev-*" # dev-new dev-this-is-new
      - "feat/**" # feat/new feat/new/button
    # paths:
    #   - '**.js'
    paths-ignore:
      - ".github/workflows/*"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying..."
