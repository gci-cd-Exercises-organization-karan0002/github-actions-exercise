name: Deployment Exercise 1 with env
on: [push, workflow_dispatch]
env: # env variable on workflow level
  MONGODB_DB_NAME: gha-demo
  MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }} #repository secret # Stored in github secrets(in settings of repository),
  # cannot echo it, github secret policy
jobs:
  lint:
    # Job based environment variable
    # env:
    #   MONGODB_DB_NAME: xyz
    #   PORT: 4000
    runs-on: ubuntu-latest
    env: # env variable on workflow level
      MONGODB_DB_NAME: gha-demo
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
    steps:
      - name: Get code
        uses: actions/checkout@v3 # if you don't mention which repository to checkout, it will fetch this one
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  test:
    environment: testing
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Echo from environment
        run: "ENV From repository environment - testing and not from repository secrets: ${{ secrets.POSTGRESQL_DB }}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying..., DB ${{ env.MONGODB_DB_NAME }} or $MONGODB_DB_NAME "
